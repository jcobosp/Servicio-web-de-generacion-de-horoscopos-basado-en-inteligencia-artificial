<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 120" width="728" height="120" role="img" aria-label="Anuncio de ejemplo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="728" height="120" rx="12" fill="url(#bg)"/>

  <!-- Etiqueta "Anuncio" (como la que muestra AdSense) -->
  <g>
    <rect x="12" y="10" width="74" height="20" rx="5" fill="#ffffff" fill-opacity="0.18"/>
    <text x="22" y="24" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="0.5">Anuncio</text>
  </g>
  <text x="96" y="24" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.7">ejemplo</text>

  <!-- Tile de producto -->
  <rect x="28" y="40" width="64" height="64" rx="14" fill="url(#tile)"/>
  <text x="60" y="84" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34">🌴</text>

  <!-- Texto del anuncio -->
  <text x="116" y="62" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#ffffff">Tu próxima escapada te espera</text>
  <text x="116" y="90" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#ffffff" fill-opacity="0.9">Vuelos y hoteles desde 29 € · reserva sin comisiones</text>

  <!-- Botón CTA -->
  <g>
    <rect x="566" y="44" width="138" height="44" rx="22" fill="#ffffff"/>
    <text x="635" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#0f766e">Ver ofertas</text>
  </g>
</svg>
